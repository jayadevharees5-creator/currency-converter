# ═══════════════════════════════════════════════════════════════
# PROD Profile — PostgreSQL Database
# Activated by: spring.profiles.active=prod
# ═══════════════════════════════════════════════════════════════

# PostgreSQL Database (configure via environment variables on Railway/Heroku)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/currencydb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# Hibernate validates schema but does not modify it
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console disabled in production
spring.h2.console.enabled=false

# Server
server.port=${PORT:8080}

# Logging
logging.level.com.example.currency_converter=INFO
