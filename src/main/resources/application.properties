# ═══════════════════════════════════════════════════════════════
# Currency Converter — Main Application Configuration
# ═══════════════════════════════════════════════════════════════

spring.application.name=currency-converter
app.version=1.0.0

# Active profile: 'dev' for H2, 'prod' for PostgreSQL
spring.profiles.active=dev

# ═══════════════════════════════════════════════════════════════
# EXTERNAL API CONFIGURATION
# ═══════════════════════════════════════════════════════════════
app.exchange-rate.api-url=https://open.er-api.com/v6/latest/
app.exchange-rate.base-currency=USD

# ═══════════════════════════════════════════════════════════════
# JPA / HIBERNATE
# ═══════════════════════════════════════════════════════════════
spring.jpa.open-in-view=false

# ═══════════════════════════════════════════════════════════════
# LOGGING
# ═══════════════════════════════════════════════════════════════
logging.level.com.example.currency_converter=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ═══════════════════════════════════════════════════════════════
# SWAGGER / OPENAPI
# ═══════════════════════════════════════════════════════════════
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ═══════════════════════════════════════════════════════════════
# DEFAULT USER (for initial setup)
# ═══════════════════════════════════════════════════════════════
app.default-user.username=testuser
app.default-user.password=password123
