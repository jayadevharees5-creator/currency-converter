<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurrencyXchange</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle">🌙</button>

    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Login Container -->
    <div id="login-container" class="glass-panel active">
        <div class="header">
            <h2>Welcome Back</h2>
            <p>Login to CurrencyXchange</p>
        </div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username (testuser)">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password (password123)">
        </div>
        <button id="login-btn" class="btn-primary">Login</button>
        <div id="login-error" class="error-msg"></div>
    </div>

    <!-- Main Dashboard Container -->
    <div id="app-container" class="app-wrapper hidden">
        <header class="app-header">
            <div class="logo">
                <span class="icon">💲💱</span> CurrencyXchange
            </div>
            <button id="logout-btn" class="btn-text">Logout</button>
        </header>

        <div class="dashboard-grid">
            <!-- Converter Panel -->
            <div class="glass-panel converter-panel">
                <div class="panel-header">
                    <h2>Convert Currency</h2>
                    <span class="subtitle">Live real-time rates</span>
                </div>

                <div class="form-group">
                    <label for="amount">AMOUNT</label>
                    <div class="input-with-icon">
                        <span class="currency-symbol">💰</span>
                        <input type="number" id="amount" value="1.00" min="0.01" step="0.01">
                    </div>
                </div>

                <div class="currency-selectors">
                    <div class="form-group flex-1">
                        <label for="from-currency">FROM</label>
                        <select id="from-currency">
                            <option value="USD">🇺🇸 USD — US Dollar</option>
                            <option value="EUR">🇪🇺 EUR — Euro</option>
                            <option value="GBP">🇬🇧 GBP — British Pound</option>
                            <option value="INR">🇮🇳 INR — Indian Rupee</option>
                        </select>
                    </div>

                    <button id="swap-btn" class="btn-icon" title="Swap currencies">⇄</button>

                    <div class="form-group flex-1">
                        <label for="to-currency">TO</label>
                        <select id="to-currency">
                            <option value="INR">🇮🇳 INR — Indian Rupee</option>
                            <option value="USD">🇺🇸 USD — US Dollar</option>
                            <option value="EUR">🇪🇺 EUR — Euro</option>
                            <option value="GBP">🇬🇧 GBP — British Pound</option>
                        </select>
                    </div>
                </div>

                <button id="convert-btn" class="btn-primary full-width">Convert</button>
                <div id="convert-error" class="error-msg"></div>

                <!-- Result Area -->
                <div id="result-area" class="result-box hidden">
                    <div class="result-amount">
                        <span id="result-value">83.50</span>
                        <span id="result-currency" class="currency-code">INR</span>
                    </div>
                    <div class="exchange-rate">
                        1 <span id="rate-from">USD</span> = <span id="rate-value">83.50</span> <span id="rate-to">INR</span>
                    </div>
                </div>
            </div>

            <!-- History Panel -->
            <div class="glass-panel history-panel">
                <div class="panel-header">
                    <h2>Conversion History</h2>
                    <button id="refresh-history-btn" class="btn-text small">Refresh</button>
                </div>
                
                <div id="history-list" class="history-list">
                    <!-- History items injected here by JS -->
                    <div class="empty-state">
                        <span class="icon">📋</span>
                        <p>No conversions yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
